version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: db_normalizacion
    ports:
      - "5432:5432" 
    volumes:
      - pgdata:/var/lib/postgresql/data 
    networks:
      - db_network 

  app:
    build: .
    volumes:
      - .:/app 
    environment:
      - DATABASE_URL=postgresql://admin:password123@db:5432/db_normalizacion 
    depends_on:
      - db
    networks:
      - db_network

networks:
  db_network:
    driver: bridge 

volumes:
  pgdata: